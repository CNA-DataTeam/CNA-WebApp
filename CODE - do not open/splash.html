<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CNA Web App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Work+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      font-family: 'Work Sans', sans-serif;
      color: #333;
      overflow: hidden;
    }

    .container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .app-title {
      font-family: 'Poppins', sans-serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .app-subtitle {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 48px;
    }

    /* Spinner */
    .spinner {
      width: 44px;
      height: 44px;
      margin: 0 auto 28px;
      border: 3.5px solid #e0e0e0;
      border-top-color: #16a085;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      font-size: 0.95rem;
      color: #666;
      min-height: 1.4em;
      transition: opacity 0.3s ease;
    }

    .status.fade { opacity: 0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="app-title">CNA Web App</div>
    <div class="app-subtitle">Clark National Accounts</div>
    <div class="spinner"></div>
    <div class="status" id="status">Starting up...</div>
  </div>

  <script>
    const PORT = 8501;
    const APP_URL = `http://localhost:${PORT}`;
    const statusEl = document.getElementById('status');

    const messages = [
      'Starting up...',
      'Checking for updates...',
      'Loading dependencies...',
      'Preparing workspace...',
      'Almost ready...',
    ];

    let msgIndex = 0;

    // Rotate status messages every 3 seconds
    setInterval(() => {
      statusEl.classList.add('fade');
      setTimeout(() => {
        msgIndex = (msgIndex + 1) % messages.length;
        statusEl.textContent = messages[msgIndex];
        statusEl.classList.remove('fade');
      }, 300);
    }, 3000);

    // Poll the Streamlit server every 1.5 seconds
    let serverReady = false;

    function checkServer() {
      fetch(APP_URL, { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
          if (!serverReady) {
            serverReady = true;
            // Server responded, but Streamlit needs time to fully initialize.
            // Show final status and wait before redirecting.
            statusEl.classList.add('fade');
            setTimeout(() => {
              statusEl.textContent = 'Almost ready...';
              statusEl.classList.remove('fade');
            }, 300);
            setTimeout(() => {
              window.location.replace(APP_URL);
            }, 4000);
          }
        })
        .catch(() => {
          // Not ready yet — try again
          setTimeout(checkServer, 1500);
        });
    }

    // Start polling after a brief initial delay
    setTimeout(checkServer, 2000);
  </script>
</body>
</html>
